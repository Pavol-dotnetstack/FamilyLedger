name: Deploy Frontend to GH Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/presentation/family-ledger-ui/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: src/presentation/family-ledger-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: src/presentation/family-ledger-ui/dist # or 'build' depending on your React setup
          branch: gh-pages